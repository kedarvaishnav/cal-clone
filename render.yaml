services:
  - type: web
    name: cal-clone
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /test-db
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cal-clone-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

databases:
  - name: cal-clone-db
    databaseName: calclone
    plan: free
